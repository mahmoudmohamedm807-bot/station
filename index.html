<script>
const firebaseConfig={apiKey:"AIzaSyBpPKBDQ3ZTcMVZ4cTPfCMWzKEXsy-xByE",authDomain:"sharkawy-3a9d0.firebaseapp.com",databaseURL:"https://sharkawy-3a9d0-default-rtdb.europe-west1.firebasedatabase.app",projectId:"sharkawy-3a9d0",storageBucket:"sharkawy-3a9d0.firebasestorage.app",messagingSenderId:"788300090166",appId:"1:788300090166:web:3af8d1937feea01df90197",measurementId:"G-WYE9RCDPWS"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const CATS=[{id:'engineer',name:'مهندس',icon:'fa-hard-hat',color:'#10b981'},{id:'supervisor',name:'مشرف',icon:'fa-user-tie',color:'#3b82f6'},{id:'operator',name:'فني تشغيل',icon:'fa-wrench',color:'#f59e0b'},{id:'security',name:'أمن',icon:'fa-shield-alt',color:'#ef4444'},{id:'driver',name:'سائق',icon:'fa-truck',color:'#8b5cf6'}];
const ATT_ALL=[{id:'present',name:'حاضر',cls:'att-present',icon:'fa-check'},{id:'absent',name:'غائب',cls:'att-absent',icon:'fa-times'},{id:'sick',name:'إجازة مرضية',cls:'att-leave',icon:'fa-medkit'},{id:'permission',name:'إذن',cls:'att-permission',icon:'fa-clock'},{id:'other_station',name:'إذن شغل محطة أخرى',cls:'att-other',icon:'fa-exchange-alt'}];
const DEF_EMPS=[{name:'م. أحمد محمود حسن',category:'engineer',phone:'01000000001',active:true},{name:'م. محمد علي سعيد',category:'engineer',phone:'01000000002',active:true},{name:'م. حسن إبراهيم عبدالله',category:'engineer',phone:'01000000003',active:true},{name:'خالد سعيد محمود',category:'supervisor',phone:'01000000004',active:true},{name:'عمرو حسن أحمد',category:'supervisor',phone:'01000000005',active:true},{name:'محمود حسن علي',category:'operator',phone:'01000000006',active:true},{name:'أحمد سعيد محمد',category:'operator',phone:'01000000007',active:true},{name:'محمد عبدالله حسن',category:'operator',phone:'01000000008',active:true},{name:'حسام محمود سعيد',category:'operator',phone:'01000000009',active:true},{name:'علي أحمد إبراهيم',category:'operator',phone:'01000000010',active:true},{name:'عمر حسين محمد',category:'operator',phone:'01000000011',active:true},{name:'ياسر محمد خالد',category:'operator',phone:'01000000012',active:true},{name:'طارق علي حسن',category:'operator',phone:'01000000013',active:true},{name:'سعيد محمود أحمد',category:'security',phone:'01000000014',active:true},{name:'حسن أحمد سعيد',category:'security',phone:'01000000015',active:true},{name:'محمد سعيد علي',category:'driver',phone:'01000000016',active:true},{name:'علي حسن محمد',category:'driver',phone:'01000000017',active:true}];

let S={employees:[],users:[],attendance:{},leaves:[],currentUser:null,activeFilters:['engineer','supervisor','operator','security','driver']};

function canAccess(p){if(!S.currentUser)return false;const r=S.currentUser.role;if(r==='مدير المحطة')return true;if(r==='مهندس')return['dashboard','attendance','monthly','leaves','history'].includes(p);return false;}
function canEdit(){return S.currentUser&&S.currentUser.role==='مدير المحطة';}
function updateSidebar(){document.querySelectorAll('.sidebar-item').forEach(b=>{b.style.display=canAccess(b.dataset.page)?'':'none';});}

function getToday(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getTime(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function fmtDate(s){if(!s)return'';const d=new Date(s+'T00:00:00');return['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'][d.getDay()]+' '+d.getDate()+' '+['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'][d.getMonth()]+' '+d.getFullYear();}
function catName(id){return(CATS.find(c=>c.id===id)||{}).name||id;}
function cat(id){return CATS.find(c=>c.id===id)||{id,name:id,icon:'fa-user',color:'#64748b'};}
function attName(id){return(ATT_ALL.find(a=>a.id===id)||{}).name||'لم يسجل';}
function attBadge(s){return{present:'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400',absent:'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400',sick:'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400',permission:'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-400',other_station:'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400'}[s]||'bg-slate-100 text-slate-500';}
function gid(){return'id_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);}
function isWeekend(s){const d=new Date(s+'T00:00:00').getDay();return d===5||d===6;}
function daysInMonth(y,m){return new Date(y,m,0).getDate();}

function toast(msg,type='success'){const c=document.getElementById('toast-container');const cl={success:'bg-emerald-500',error:'bg-red-500',warning:'bg-amber-500',info:'bg-blue-500'};const ic={success:'fa-check-circle',error:'fa-exclamation-circle',warning:'fa-exclamation-triangle',info:'fa-info-circle'};const t=document.createElement('div');t.className=`${cl[type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 toast-in`;t.innerHTML=`<i class="fas ${ic[type]}"></i><span class="text-sm font-medium flex-1">${msg}</span><button onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>`;c.appendChild(t);setTimeout(()=>{t.classList.replace('toast-in','toast-out');setTimeout(()=>t.remove(),300);},3500);}

function openModal(h){document.getElementById('modal-body').innerHTML=h;document.getElementById('modal-overlay').classList.remove('hidden');document.body.style.overflow='hidden';}
function closeModal(e){if(e&&e.target!==document.getElementById('modal-overlay'))return;document.getElementById('modal-overlay').classList.add('hidden');document.body.style.overflow='';}
function closeModal2(){document.getElementById('modal-overlay').classList.add('hidden');document.body.style.overflow='';}

function animNum(id,target){const el=document.getElementById(id);if(!el)return;let cur=0;const step=Math.max(1,Math.ceil(target/15));const iv=setInterval(()=>{cur=Math.min(cur+step,target);el.textContent=cur;if(cur>=target)clearInterval(iv);},40);}

function loadAll(){return Promise.all([db.ref('employees').once('value'),db.ref('users').once('value'),db.ref('attendance').once('value'),db.ref('leaves').once('value')]).then(([e,u,a,l])=>{const ed=e.val();S.employees=ed?Object.entries(ed).map(([k,v])=>({...v,id:k}))[];const ud=u.val();S.users=ud?Object.entries(ud).map(([k,v])=>({...v,username:k}))[];S.attendance=a.val()||{};const ld=l.val();S.leaves=ld?Object.entries(ld).map(([k,v])=>({...v,id:k}))[];if(!S.employees.length)return initDef();});}
function initDef(){const u={};DEF_EMPS.forEach(e=>{u['employees/'+gid()]={name:e.name,category:e.category,phone:e.phone,active:true};});u['users/admin']={name:'المدير',password:'1234',role:'مدير المحطة'};return db.ref().update(u).then(()=>loadAll());}

function handleLogin(){const un=document.getElementById('login-user').value.trim(),pw=document.getElementById('login-pass').value.trim();const user=S.users.find(x=>x.username===un&&x.password===pw);if(user){S.currentUser=user;document.getElementById('login-screen').style.display='none';document.getElementById('app').classList.remove('hidden');document.getElementById('current-user-name').textContent=user.name;document.getElementById('current-user-role').textContent=user.role;updateSidebar();initApp();}else{document.getElementById('login-error').classList.remove('hidden');setTimeout(()=>document.getElementById('login-error').classList.add('hidden'),3000);}}
function handleLogout(){S.currentUser=null;document.getElementById('app').classList.add('hidden');document.getElementById('login-screen').style.display='flex';document.getElementById('login-pass').value='';}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('login-screen').style.display!=='none')handleLogin();});

function navigate(p){if(!canAccess(p)){toast('ليس لديك صلاحية','warning');return;}document.querySelectorAll('.page').forEach(x=>x.classList.add('hidden'));const t=document.getElementById('page-'+p);if(t){t.classList.remove('hidden');t.classList.remove('page-enter');void t.offsetWidth;t.classList.add('page-enter');}const info=TITLES[p]||{t:'',s:''};document.getElementById('page-title').textContent=info.t;document.getElementById('page-subtitle').textContent=info.s+' - '+fmtDate(getToday());document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.toggle('active',i.dataset.page===p));if(window.innerWidth<768)toggleSidebar(false);({dashboard:renderDash,attendance:renderAtt,monthly:renderMonthly,history:renderHist,leaves:renderLeaves,employees:renderEmps,settings:renderSett}[p]||function(){})();}

function renderDash(){const today=getToday(),ta=S.attendance[today]||{},ae=S.employees.filter(e=>e.active),total=ae.length;let present=0,absent=0,leaves=0;const cc={};const rn=[];CATS.forEach(c=>{cc[c.id]={total:0,present:0};});ae.forEach(emp=>{cc[emp.category]=cc[emp.category]||{total:0,present:0};cc[emp.category].total++;const a=ta[emp.id];if(a){if(a.status==='present'){present++;cc[emp.category].present++;}else if(a.status==='absent')absent++;else leaves++;if(a.note)rn.push({name:emp.name,note:a.note});}else absent++;});let trendHtml='<div class="flex items-end gap-2 h-28 px-2">';const dayN=['أحد','إثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');const da=S.attendance[ds]||{};let pr=0;Object.values(da).forEach(a=>{if(a.status==='present')pr++;});const pct=total>0?Math.round(pr/total*100):0;const isT=ds===today;trendHtml+=`<div class="flex-1 flex flex-col items-center gap-1"><span class="text-[10px] font-bold ${isT?'text-emerald-400':'text-slate-400'}">${pct}%</span><div class="w-full rounded-t-md trend-bar bar-anim ${isT?'bg-emerald-500':'bg-emerald-500/30'}" style="--h:${Math.max(8,pct)}%;height:${Math.max(8,pct)}%"></div><span class="text-[9px] ${isT?'text-emerald-400 font-bold':'text-slate-500'}">${dayN[d.getDay()]}</span></div>`;}trendHtml+='</div>';let catHtml=CATS.map(c=>{const d=cc[c.id]||{total:0,present:0};const pct=d.total>0?Math.round(d.present/d.total*100):0;return`<div class="flex items-center gap-3"><div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:${c.color}20"><i class="fas ${c.icon} text-xs" style="color:${c.color}"></i></div><div class="flex-1"><div class="flex justify-between text-sm mb-1"><span class="text-slate-700 dark:text-slate-200 font-medium">${c.name}</span><span class="text-slate-400">${d.present}/${d.total}</span></div><div class="pct /p><p class="text-xs text-slate-400 mt-1">حاضرون اليوم</p></div><div class="card-hover bg-white dark:bg-slate-800 rounded-2xl p-4 border border-slate-100 dark:border-slate-700"><div class="flex items-center justify-between mb-3"><div class="w-10 h-10 rounded-xl bg-red-50 dark:bg-red-900/20 flex items-center justify-center"><i class="fas fa-times-circle text-red-500"></i></div><span class="badge bg-red-50 text-red-600 dark:bg-red-900/30 dark:text-red-400">غائب</span></div><p id="st-absent" class="text-3xl font-extrabold text-red-500">0</p><p class="text-xs text-slate-400 mt-1">غائبون اليوم</p></div><div class="card-hover bg-white dark:bg-slate-800 rounded-2xl p-4 border border-slate-100 dark:border-slate-700"><div class="flex items-center justify-between mb-3"><div class="w-10 h-10 rounded-xl bg-amber-50 dark:bg-amber-900/20 flex items-center justify-center"><i class="fas fa-clock text-amber-500"></i></div><span class="badge bg-amber-50 text-amber-600 dark:bg-amber-900/30 dark:text-amber-400">إجازات</span></div><p id="st-leaves" class="text-3xl font-extrabold text-amber-500">0</p><p class="text-xs text-slate-400 mt-1">إجازات اليوم</p></div></div><div class="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-100 dark:border-slate-700 mb-6"><h3 class="font-bold text-slate-900 dark:text-white mb-4"><i class="fas fa-chart-line text-emerald-500 ml-2"></i>نسبة الحضور - آخر 7 أيام</h3>${trendHtml}</div><div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6"><div class="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-100 dark:border-slate-700"><h3 class="font-bold text-slate-900 dark:text-white mb-4"><i class="fas fa-layer-group text-emerald-500 ml-2"></i>التوزيع حسب الفئة</h3><div class="space-y-3">${catHtml}</div></div><div class="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-100 dark:border-slate-700"><h3 class="font-bold text-slate-900 dark:text-white mb-4"><i class="fas fa-clipboard-list text-emerald-500 ml-2"></i>آخر الملاحظا function renderAtt(){const di=getToday(),date=di,dayAtt=S.attendance[date]||{};let filterHtml=CATS.map(c=>{const a=S.activeFilters.includes(c.id);return`<button onclick="togFilter('${c.id}')" class="px-3 py-1.5 rounded-lg text-xs font-medium transition ${a?'text-white shadow-sm':'bg-slate-100 dark:bg-slate-700 text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-600'}" style="${a?'background:'+c.color:''}"><i class="fas ${c.icon} ml-1"></i>${c.name}</button>`;}).join('');const filtered=S.employees.filter(e=>e.active&&S.activeFilters.includes(e.category));const grouped={};filtered.forEach(e=>{if(!grouped[e.category])grouped[e.category]=[];grouped[e.category].push(e);});let listHtml='';CATS.forEach(c=>{if(!grouped[c.id])return;listHtml+=`<div class="mb-4"><div class="flex items-center gap-2 mb-2 px-1"><div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:${c.color}20"><i class="fas ${c.icon} text-xs" style="color:${c.color}"></i></div><h4 class="font-bold text-slate-800 dark:text-slate-100 text-sm">${c.name}</h4><span class="text-xs text-slate-400">(${grouped[c.id].length})</span></div><div class="space-y-2">`;grouped[c.id].forEach(emp=>{const att=dayAtt[emp.id]||{};const st=att.status||null;let statusBadge='';if(st&&st!=='present'&&st!=='absent')statusBadge=`<span class="badge ${attBadge(st)}">${attName(st)}</span>`;listHtml+=`<div class="emp-row bg-white dark:bg-slate-800 rounded-xl p-3 border border-slate-100 dark:border-slate-700"><div class="flex items-center gap-3 mb-2"><div class="w-9 h-9 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style="background:${c.color}">${emp.name.charAt(0)}</div><div class="flex-1 min-w-0"><p class="text-sm font-semibold text-slate-800 dark:text-white truncate">${emp.name}</p>${st?`<span class="text-xs text-slate-400">ساعة الحضور: ${att.time||'-'}</span>`:'<span class="text-xs text-slate-400">لم يسجل بعد</span>'}</div>${statusBadge}</div><div class="flex flex-wrap gap-2 mb-2">${ATT_ALL.filter(t=>t.id==='present'||t.id==='absent').map(t=>`<button onclick="setAtt('${date}','${emp.id}','${t.id}')" class="px-5 py-2 rounded-lg text-xs font-medium transition-all ${st===t.id?t.cls+' shadow-md':'bg-slate-100 dark:bg-slate-700 text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-600'}"><i class="fas ${t.icon} ml-1"></i>${t.name}</button>`).join('')}</div><div class="flex flex-wrap gap-2"><input type="time" id="time_${emp.id}" value="${att.time||getTime()}" class="bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-2 py-1 text-xs text-slate-700 dark:text-slate-200 outline-none focus:border-emerald-500"><input type="time" id="exit_${emp.id}" value="${att.exitTime||''}" class="bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-2 py-1 text-xs text-slate-700 dark:text-slate-200 outline-none focus:border-emerald-500"><input type="text" id="note_${emp.id}" value="${att.note||''}" placeholder="ملاحظات..." class="flex-1 min-w-[120px] bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-2 py-1 text-xs text-slate-700 dark:text-slate-200 outline-none focus:border-emerald-500"></div></div>`;});listHtml+='</div></div>';});document.getElementById('page-attendance').innerHTML=`<div class="bg-white dark:bg-slate-800 rounded-2xl p-4 mb-4 border border-slate-100 dark:border-slate-700 flex flex-wrap items-center gap-3"><div class="flex items-center gap-2 bg-slate-50 dark:bg-slate-900 rounded-xl px-4 py-2"><i class="fas fa-calendar-day text-emerald-500"></i><span class="text-sm font-medium text-slate-800 dark:text-white">${fmtDate(di)}</span></div><div class="flex-1"></div><button onclick="markAll()" class="px-4 py-2 rounded-xl bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400 text-sm font-medium hover:bg-green-100 dark:hover:bg-green-900/30 transition"><i class="fas fa-check-double ml-1"></i>تحضير الكل</button><button onclick="resetAtt()" class="px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-900 text-slate-500 text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-800 transition"><i class="fas fa-undo ml-1"></i>إعادة تعيين</button></div><div class="flex flex-wrap gap-2 mb-4">${filterHtml}</div><div class="space-y-2">${listHtml||'<p class="text-slate-400 text-center py-8">لا يوجد موظفين</p>'}</div><div class="mt-6 flex justify-center"><button onclick="saveAtt()" class="px-8 py-3 bg-gradient-to-l from-emerald-600 to-emerald-500 text-white rounded-xl font-bold text-lg shadow-lg shadow-emerald-500/25 hover:shadow-xl transition-all active:scale-[0.98]"><i class="fas fa-save ml-2"></i>حفظ الحضور</button></div>`;}
function togFilter(id){const i=S.activeFilters.indexOf(id);if(i>-1)S.activeFilters.splice(i,1);else S.activeFilters.push(id);renderAtt();}
function setAtt(date,empId,status){if(!S.attendance[date])S.attendance[date]={};const prev=S.attendance[date][empId]||{};const te=document.getElementById('time_'+empId),ee=document.getElementById('exit_'+empId),ne=document.getElementById('note_'+empId);if(prev.status===status){delete S.attendance[date][empId];}else{S.attendance[date][empId]={status,time:te?te.value:getTime(),exitTime:ee?ee.value:'',note:ne?ne.value:''};}renderAtt();}
function markAll(){const d=getToday();if(!S.attendance[d])S.attendance[d]={};S.employees.filter(e=>e.active&&S.activeFilters.includes(e.category)).forEach(e=>{if(!S.attendance[d][e.id])S.attendance[d][e.id]={status:'present',time:getTime(),exitTime:'',note:''};});renderAtt();toast('تم تحضير الجميع');}

function saveAtt(){const d=getToday();if(!S.attendance[d])S.attendance[d]={};S.employees.filter(e=>e.active).forEach(emp=>{if(S.attendance[d][emp.id]){const te=document.getElementById('time_'+emp.id),ee=document.getElementById('exit_'+emp.id),ne=document.getElementById('note_'+emp.id);if(te)S.attendance[d][emp.id].time=te.value;if(ee)S.attendance[d][emp.id].exitTime=ee.value;if(ne)S.attendance[d][emp.id].note=ne.value;}});toast('جاري الحفظ...','info');db.ref('attendance/'+d).set(S.attendance[d]).then(()=>toast('تم حفظ الحضور بنجاح')).catch(e=>toast('خطأ: '+e.message,'error'));}

function renderMonthly(){const now=new Date();const defMonth=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');document.getElementById('page-monthly').innerHTML=`<div class="bg-white dark:bg-slate-800 rounded-2xl p-4 mb-4 border border-slate-100 dark:border-slate-700 flex flex-wrap items-center gap-3"><div class="flex items-center gap-2 bg-slate-50 dark:bg-slate-900 rounded-xl px-4 py-2"><i class="fas fa-calendar-alt text-emerald-500"></i><input id="month-pick" type="month" value="${defMonth}" onchange="buildMonthly()" class="bg-transparent border-none outline-none text-slate-800 dark:text-white font-medium text-sm"></div><div class="flex-1"></div><button onclick="exportMonthly()" class="px-4 py-2 rounded-xl bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400 text-sm font-medium hover:bg-green-100 dark:hover:bg-green-900/30 transition"><i class="fas fa-file-excel ml-1"></i>تصدير Excel</button><button onclick="printMonthly()" class="px-4 py-2 rounded-xl bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 text-sm font-medium hover:bg-blue-100 dark:hover:bg-blue-900/30 transition"><i class="fas fa-print ml-1"></i>طباعة</button></div><div id="monthly-summary"></div><div id="monthly-body" class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 overflow-hidden"><p class="text-slate-400 text-sm text-center py-8">اضغط على الشهر</p></div>`;buildMonthly();}
function buildMonthly(){const val=document.getElementById('month-pick').value;if(!val)return;const[y,m]=val.split('-').map(Number);const dim=daysInMonth(y,m);const today=getToday();const ae=S.employees.filter(e=>e.active);let totalWorking=0,totalPresent=0,best={name:'',pct:0},worst={name:'',pct:101};const rows=ae.map(emp=>{let p=0,a=0,s=0,pm=0,o=0,nr=0;for(let d=1;d<=dim;d++){const ds=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;if(isWeekend(ds)||ds>today)continue;totalWorking++;const att=(S.attendance[ds]||{})[emp.id];if(!att)nr++;else{switch(att.status){case'present':p++;break;case'absent':a++;break;case'sick':s++;break;case'permission':pm++;break;case'other_station':o++;break;}}}const wd=p+a+s+pm+o+nr;const pct=wd>0?Math.round(p/wd*100):0;if(pct>best.pct)best={name:emp.name,pct};if(pct<worst.pct&&wd>0)worst={name:emp.name,pct};totalPresent+=p;return{emp,p,a,s,pm,o,nr,wd,pct};});const avgPct=totalWorking>0?Math.round(totalPresent/totalWorking*100):0;document.getElementById('monthly-summary').innerHTML=`<div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4"><div class="bg-white dark:bg-slate-800 rounded-2xl p-4 border border-slate-100 dark:border-slate-700 text-center"><p class="text-xs text-slate-400 mb-1">أيام العمل</p><p class="text-2xl font-extrabold text-slate-900 dark:text-white">${totalWorking}</p></div><div class="bg-white dark:bg-slate-800 rounded-2xl p-4 border border-slate-100 dark:border-slate-700 text-center"><p class="text-xs text-slate-400 mb-1">متوسط الحضور</p><p class="text-2xl font-extrabold text-emerald-500">${avgPct}%</p></div><div class="bg-white dark:bg-slate-800 rounded-2xl p-4 border border-slate-100 dark:border-slate-700 text-center"><p class="text-xs text-slate-400 mb-1">الأعلى حضوراً</p><p class="text-sm font-bold text-green-600 dark:text-green-400">${best.name||'-'}</p><p class="text-lg font-extrabold text-green-500">${best.pct}%</p></div><div class="bg-white dark:bg-slate-800 rounded-2xl p-4 border border-slate-100 dark:border-slate-700 text-center"><p class="text-xs text-slate-400 mb-1">الأقل حضوراً</p><p class="text-sm font-bold text-red-600 dark:text-red-400">${worst.name||'-'}</p><p class="text-lg font-extrabold text-red-500">${worst.pct<101?worst.pct+'%':'-'}</p></div></div>`;let tbl=`<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-slate-50 dark:bg-slate-900/50"><th class="px-3 py-3 text-right font-semibold text-slate-600 dark:text-slate-300 sticky right-0 bg-inherit min-w-[50px]">#</th><th class="px-3 py-3 text-right font-semibold text-slate-600 dark:text-slate-300 min-w-[140px]">الاسم</th><th class="px-3 py-3 text-center font-semibold text-slate-600 dark:text-slate-300 min-w-[80px]">الفئة</th><th class="px-3 py-3 text-center font-semibold text-green-600 dark:text-green-400">حاضر</th><th class="px-3 py-3 text-center font-semibold text-red-500">غائب</th><th class="px-3 py-3 text-center font-semibold text-amber-500">مرضي</th><th class="px-3 py-3 text-center font-semibold text-purple-500">إذن</th><th class="px-3 py-3 text-center font-semibold text-blue-500">محطة أخرى</th><th class="px-3 py-3 text-center font-semibold text-slate-500">لم يسجل</th><th class="px-3 py-3 text-center font-semibold text-slate-600 dark:text-slate-300">أيام عمل</th><th class="px-3 py-3 text-center font-semibold text-slate-600 dark:text-slate-300 min-w-[140px]">النسبة</th></tr></thead><tbody>`;rows.forEach((r,i)=>{const c=cat(r.emp.category);const pColor=r.pct>=80?'text-green-600 dark:text-green-400':r.pct>=50?'text-amber-500':'text-red-500';const bColor=r.pct>=80?'bg-green-500':r.pct>=50?'bg-amber-500':'bg-red-500';tbl+=`<tr class="${i%2===0?'bg-white dark:bg-slate-800':'bg-slate-50/50 dark:bg-slate-800/50'} border-t border-slate-100 dark:border-slate-700"><td class="px-3 py-2 text-slate-400 text-xs">${i+1}</td><td class="px-3 py-2 text-right font-medium text-slate-800 dark:text-white text-xs whitespace-nowrap">${r.emp.name}</td><td class="px-3 py-2 text-center"><span class="badge" style="background:${c.color}20;color:${c.color}">${c.name}</span></td><td class="px-3 py-2 text-center font-bold text-green-600 dark:text-green-400">${r.p}</td><td class="px-3 py-2 text-center font-bold text-red-500">${r.a}</td><td class="px-3 py-2 text-center font-bold text-amber-500">${r.s}</td><td class="px-3 py-2 text-center font-bold text-purple-500">${r.pm}</td><td class="px-3 py-2 text-center font-bold text-blue-500">${r.o}</td><td class="px-3 py-2 text-center text-slate-400">${r.nr}</td><td class="px-3 py-2 text-center font-medium">${r.wd}</td><td class="px-3 py-2 text-center"><div class="flex items-center justify-center gap-2"><div class="w-16 pct-bar"><div class="pct-fill ${bColor}" style="width:${r.pct}%"></div></div><span class="font-bold text-xs ${pColor}">${r.pct}%</span></div></td></tr>`;});tbl+='</tbody></table></div>';document.getElementById('monthly-body').innerHTML=tbl;}
function exportMonthly(){const val=document.getElementById('month-pick').value;if(!val){toast('اختر الشهر','warning');return;}const[y,m]=val.split('-').map(Number);const dim=daysInMonth(y,m);const today=getToday();const ae=S.employees.filter(e=>e.active);let csv='\uFEFF'+val+'\nالاسم,الفئة,حاضر,غائب,إجازة مرضية,إذن,محطة أخرى,لم يسجل,أيام عمل,النسبة %\n';ae.forEach(emp=>{let p=0,a=0,s=0,pm=0,o=0,nr=0;for(let d=1;d<=dim;d++){const ds=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;if(isWeekend(ds)||ds>today)continue;const att=(S.attendance[ds]||{})[emp.id];if(!att)nr++;else{switch(att.status){case'present':p++;break;case'absent':a++;break;case'sick':s++;break;case'permission':pm++;break;case'other_station':o++;break;}}}const wd=p+a+s+pm+o+nr;csv+=`"${emp.name}","${catName(emp.category)}",${p},${a},${s},${pm},${o},${nr},${wd},${wd>0?Math.round(p/wd*100):0}\n`;});const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download=`تقرير_${val}.csv`;link.click();toast('تم التصدير');}
function printMonthly(){const content=document.getElementById('monthly-body').innerHTML;const summary=document.getElementById('monthly-summary').innerHTML;const w=window.open('','','width=900,height=700');w.document.write(`<html dir="rtl"><head><title>تقرير شهري</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet"><style>*{font-family:'Cairo',sans-serif}body{padding:20px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:8px;text-align:center;font-size:12px}th{background:#064e3b;color:#fff}h2{text-align:center;color:#064e3b}</style></head><body><h2>محطة مركز المدينة - SHARKAWY</h2><h3>${document.getElementById('month-pick').value}</h3>${summary}${content}<script>setTimeout(()=>window.print(),500)<\/script></body></html>`);}

function renderHist(){const today=getToday();const yest=new Date();yest.setDate(yest.getDate()-1);const yestStr=yest.getFullYear()+'-'+String(yest.getMonth()+1).padStart(2,'0')+'-'+String(yest.getDate()).padStart(2,'0');const weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-6);const waStr=weekAgo.getFullYear()+'-'+String(weekAgo.getMonth()+1).padStart(2,'0')+'-'+String(weekAgo.getDate()).padStart(2,'0');document.getElementById('page-history').innerHTML=`<div class="bg-white dark:bg-slate-800 rounded-2xl p-4 mb-4 border border-slate-100 dark:border-slate-700"><div class="flex flex-wrap gap-2 mb-3"><button onclick="quickHist('${today}','${today}')" class="px-4 py-2 rounded-xl bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 dark:text-emerald-400 text-sm font-medium hover:bg-emerald-100 transition"><i class="fas fa-calendar-day ml-1"></i>اليوم</button><button onclick="quickHist('${yestStr}','${yestStr}')" class="px-4 py-2 rounded-xl bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 text-sm font-medium hover:bg-blue-100 transition"><i class="fas fa-calendar-minus ml-1"></i>أمس</button><button onclick="quickHist('${waStr}','${today}')" class="px-4 py-2 rounded-xl bg-purple-50 dark:bg-purple-900/20 text-purple-600 dark:text-purple-400 text-sm font-medium hover:bg-purple-100 transition"><i class="fas fa-calendar-week ml-1"></i>آخر 7 أيام</button></div><div class="flex flex-wrap items-center gap-3"><div class="flex items-center gap-2 bg-slate-50 dark:bg-slate-900 rounded-xl px-4 py-2"><i class="fas fa-calendar text-emerald-500"></i><input id="hist-from" type="date" value="${waStr}" class="bg-transparent border-none outline-none text-slate-800 dark:text-white font-medium text-sm"></div><span class="text-slate-400 text-sm">إلى</span><div class="flex items-center gap-2 bg-slate-50 dark:bg-slate-900 rounded-xl px-4 py-2"><input id="hist-to" type="date" value="${today}" class="bg-transparent border-none outline-none text-slate-800 dark:text-white font-medium text-sm"></div><button onclick="doHist()" class="px-4 py-2 rounded-xl bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 dark:text-emerald-400 text-sm font-medium hover:bg-emerald-100 transition"><i class="fas fa-search ml-1"></i>بحث</button><div class="flex-1"></div><button onclick="exportHist()" class="px-4 py-2 rounded-xl bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400 text-sm font-medium hover:bg-green-100 transition"><i class="fas fa-file-export ml-1"></i>تصدير</button></div></div><div id="hist-body" class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 overflow-hidden"><p class="text-slate-400 text-sm text-center py-8">اضغط على زر سريع أو اختر فترة</p></div>`;quickHist(waStr,today);}
function quickHist(f,t){document.getElementById('hist-from').value=f;document.getElementById('hist-to').value=t;doHist();}
function doHist(){const from=document.getElementById('hist-from').value,to=document.getElementById('hist-to').value;if(!from||!to)return;const dates=[];const d=new Date(from+'T00:00:00'),end=new Date(to+'T00:00:00');while(d<=end){dates.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));d.setDate(d.getDate()+1);}if(dates.length>31){toast('أقصى 31 يوم','warning');return;}const ae=S.employees.filter(e=>e.active);let html='<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-slate-50 dark:bg-slate-900/50"><th class="px-3 py-3 text-right font-semibold text-slate-600 dark:text-slate-300 sticky right-0 bg-inherit text-xs">الموظف</th>';const dayN=['أحد','إثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];dates.forEach(dt=>{const d2=new Date(dt+'T00:00:00');html+=`<th class="px-2 py-3 text-center font-semibold text-slate-600 dark:text-slate-300 text-[10px] whitespace-nowrap">${d2.getDate()}<br><span class="text-slate-400">${dayN[d2.getDay()]}</span></th>`;});html+='</tr></thead><tbody>';ae.forEach((emp,idx)=>{const c=cat(emp.category);html+=`<tr class="${idx%2===0?'bg-white dark:bg-slate-800':'bg-slate-50/50 dark:bg-slate-800/50'} border-t border-slate-100 dark:border-slate-700"><td class="px-3 py-2 text-right font-medium text-slate-800 dark:text-white whitespace-nowrap sticky right-0 bg-inherit text-xs">${emp.name}</td>`;dates.forEach(dt=>{const att=(S.attendance[dt]||{})[emp.id];let cell='<td class="px-1 py-2 text-center">';if(att){const cl={present:'bg-emerald-500',absent:'bg-red-500',sick:'bg-amber-500',permission:'bg-purple-500',other_station:'bg-blue-500'};const ic={present:'fa-check',absent:'fa-times',sick:'fa-medkit',permission:'fa-clock',other_station:'fa-exchange-alt'};cell+=`<div class="w-6 h-6 mx-auto rounded-full ${cl[att.status]||'bg-slate-300'} flex items-center justify-center" title="${attName(att.status)} ${att.time||''}\n${att.note||''}"><i class="fas ${ic[att.status]||'fa-question'} text-white" style="font-size:9px"></i></div>`;}else{cell+='<div class="w-6 h-6 mx-auto rounded-full bg-slate-200 dark:bg-slate-700"></div>';}cell+='</td>';html+=cell;});html+='</tr>';});html+='</tbody></table></div>';document.getElementById('hist-body').innerHTML=html;}
function exportHist(){const from=document.getElementById('hist-from').value,to=document.getElementById('hist-to').value;if(!from||!to){toast('اختر الفترة','warning');return;}const ae=S.employees.filter(e=>e.active);let csv='\uFEFFالموظف,الفئة';const dates=[];const d=new Date(from+'T00:00:00'),end=new Date(to+'T00:00:00');while(d<=end){const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');dates.push(ds);csv+=','+ds;d.setDate(d.getDate()+1);}csv+='\n';ae.forEach(emp=>{csv+=`"${emp.name}","${catName(emp.category)}"`;dates.forEach(dt=>{const att=(S.attendance[dt]||{})[emp.id];csv+=att?`,"${attName(att.status)} ${att.time||''}"`:',"-"';});csv+='\n';});const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download=`سجل_${from}_to_${to}.csv`;link.click();toast('تم التصدير');}

function renderLeaves(){const sorted=[...S.leaves].sort((a,b)=>b.date.localeCompare(a.date));const tc={sick:'amber',permission:'purple',other_station:'blue'};const ti={sick:'fa-medkit',permission:'fa-clock',other_station:'fa-exchange-alt'};const tn={sick:'إجازة مرضية',permission:'إذن',other_station:'إذن شغل محطة أخرى'};let html=canEdit()?'<div class="flex justify-between items-center mb-4"><h3 class="font-bold text-slate-900 dark:text-white">سجل الأذونات والإجازات</h3><button onclick="openLeaveModal()" class="px-4 py-2 bg-emerald-500 text-white rounded-xl text-sm font-medium hover:bg-emerald-600 transition"><i class="fas fa-plus ml-1"></i>إضافة جديد</button></div>':'<h3 class="font-bold text-slate-900 dark:text-white mb-4">سجل الأذونات والإجازات</h3>';if(sorted.length===0){html+='<div class="bg-white dark:bg-slate-800 rounded-2xl p-8 border border-slate-100 dark:border-slate-700 text-center"><i class="fas fa-calendar-check text-4xl text-slate-300 dark:text-slate-600 mb-3"></i><p class="text-slate-400">لا توجد أذونات أو إجازات</p></div>';}else{html+=sorted.map(l=>{const emp=S.employees.find(e=>e.id===l.empId);const c=tc[l.type]||'gray';return`<div class="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-100 dark:border-slate-700 mb-3 flex items-start gap-3"><div class="w-10 h-10 rounded-xl bg-${c}-50 dark:bg-${c}-900/20 flex items-center justify-center flex-shrink-0"><i class="fas ${ti[l.type]||'fa-calendar'} text-${c}-500"></i></div><div class="flex-1 min-w-0"><div class="flex items-center gap-2 flex-wrap"><span class="font-semibold text-slate-800 dark:text-white text-sm">${emp?emp.name:'غير معروف'}</span><span class="badge bg-${c}-100 text-${c}-700 dark:bg-${c}-900/30 dark:text-${c}-400">${tn[l.type]||l.type}</span></div><p class="text-xs text-slate-400 mt-1"><i class="fas fa-calendar-day ml-1"></i>${fmtDate(l.date)}</p>${l.note?`<p class="text-xs text-slate-500 mt-1"><i class="fas fa-sticky-note ml-1"></i>${l.note}</p>`:''}</div>${canEdit()?`<button onclick="delLeave('${l.id}')" class="w-8 h-8 rounded-lg bg-red-50 dark:bg-red-900/20 flex items-center justify-center text-red-400 hover:bg-red-100 transition flex-shrink-0"><i class="fas fa-trash text-xs"></i></button>`:''}</div>`;}).join('');}document.getElementById('page-leaves').innerHTML=html;}
function openLeaveModal(){const opts=S.employees.filter(e=>e.active).map(e=>`<option value="${e.id}">${e.name} - ${catName(e.category)}</option>`).join('');openModal(`<div class="p-6"><h3 class="text-lg font-bold text-slate-900 dark:text-white mb-4">إضافة إذن/إجازة</h3><div class="space-y-3"><div><label class="block text-sm text-slate-600 dark:text-slate-300 mb-1">الموظف</label><select id="lv-emp" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-800 dark:text-white outline-none focus:border-emerald-500"><option value="">اختر</option>${opts}</select></div><div><label class="block text-sm text-slate-600 dark:text-slate-300 mb-1">النوع</label><select id="lv-type" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-800 dark:text-white outline-none focus:border-emerald-500"><option value="sick">إجازة مرضية</option><option value="permission">إذن</option><option value="other_station">إذن شغل محطة أخرى</option></select></div><div><label class="block text-sm text-slate-600 dark:text-slate-300 mb-1">التاريخ</label><input id="lv-date" type="date" value="${getToday()}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-800 dark:text-white outline-none focus:border-emerald-500"></div><div><label class="block text-sm text-slate-600 dark:text-slate-300 mb-1">ملاحظات</label><textarea id="lv-note" rows="2" placeholder="ملاحظات..." class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-800 dark:text-white outline-none focus:border-emerald-500 resize-none"></textarea></div></div><div class="flex gap-2 mt-5"><button onclick="saveLeave()" class="flex-1 bg-emerald-500 text-white py-2.5 rounded-xl font-medium text-sm hover:bg-emerald-600 transition">حفظ</button><button onclick="closeModal2()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 py-2.5 rounded-xl font-medium text-sm hover:bg-slate-200 transition">إلغاء</button></div></div>`);}
function saveLeave(){const empId=document.getElementById('lv-emp').value,type=document.getElementById('lv-type').value,date=document.getElementById('lv-date').value,note=document.getElementById('lv-note').value.trim();if(!empId){toast('اختر الموظف','warning');return;}if(!date){toast('اختر التاريخ','warning');return;}const id=gid();db.ref('leaves/'+id).set({empId,type,date,note}).then(()=>{if(!S.attendance[date])S.attendance[date]={};S.attendance[date][empId]={status:type,time:'',exitTime:'',note};db.ref('attendance/'+date+'/'+empId).set(S.attendance[date][empId]);S.leaves.push({id,empId,type,date,note});closeModal2();renderLeaves();toast('تم الحفظ');}).catch(e=>toast('خطأ: '+e.message,'error'));}
function delLeave(id){openModal(`<div class="p-6 text-center"><div class="w-14 h-14 mx-auto mb-4 rounded-full bg-red-50 dark:bg-red-900/20 flex items-center justify-center"><i class="fas fa-trash text-red-500 text-xl"></i></div><h3 class="text-lg font-bold text-slate-900 dark:text-white mb-2">حذف؟</h3><div class="flex gap-2 mt-5"><button onclick="db.ref('leaves/${id}').remove().then(()=>{S.leaves=S.leaves.filter(l=>l.id!==id);closeModal2();renderLeaves();toast('تم الحذف','info')})" class="flex-1 bg-red-500 text-white py-2.5 rounded-xl font-medium text-sm hover:bg-red-600 transition">حذف</button><button onclick="closeModal2()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 py-2.5 rounded-xl font-medium text-sm hover:bg-slate-200 transition">إلغاء</button></div></div>`);}

function renderEmps(){const search=(document.getElementById('emp-search')?.value||'').toLowerCase();const filtered=S.employees.filter(e=>e.active&&e.name.toLowerCase().includes(search));let html=canEdit()?'<div class="flex flex-wrap justify-between items-center mb-4 gap-3"><div class="flex items-center gap-2 bg-white dark:bg-slate-800 rounded-xl px-4 py-2 border border-slate-200 dark:border-slate-700 w-64"><i class="fas fa-search text-slate-400"></i><input id="emp-search" type="text" placeholder="بحث..." class="bg-transparent border-none outline-none text-slate-800 dark:text-white text-sm w-full" oninput="renderEmps()"></div><button onclick="openEmpModal()" class="px-4 py-2 bg-emerald-500 text-white rounded-xl text-sm font-medium hover:bg-emerald-600 transition"><i class="fas fa-user-plus ml-1"></i>إضافة موظف</button></div>':'<div class="mb-4"><div class="flex items-center gap-2 bg-white dark:bg-slate-800 rounded-xl px-4 py-2 border border-slate-200 dark:border-slate-700 w-64"><i class="fas fa-search text-slate-400"></i><input id="emp-search" type="text" placeholder="بحث..." class="bg-transparent border-none outline-none text-slate-800 dark:text-white text-sm w-full" oninput="renderEmps()"></div></div>';if(filtered.length===0){html+='<p class="text-slate-400 text-sm text-center py-8">لا يوجد موظفين</p>';}else{html+='<div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 overflow-hidden">';CATS.forEach(c=>{const emps=filtered.filter(e=>e.category===c.id);if(!emps.length)return;html+=`<div class="px-4 py-2 bg-slate-50 dark:bg-slate-900/50 border-b border-slate-100 dark:border-slate-700"><div class="flex items-center gap-2"><i class="fas ${c.icon}" style="color:${c.color}"></i><span class="font-semibold text-slate-700 dark:text-slate-200 text-sm">${c.name}</span><span class="text-xs text-slate-400">(${emps.length})</span></div></div>`;emps.forEach((emp,idx)=>{html+=`<div class="px-4 py-3 flex items-center gap-3 ${idx<emps.length-1?'border-b border-slate-100 dark:border-slate-700':''} hover:bg-slate-50 dark:hover:bg-slate-800/50 transition"><div class="w-9 h-9 rounded-full flex items-center justify-center text-white text-xs font-bold" style="background:${c.color}">${emp.name.charAt(0)}</div><div class="flex-1 min-w-0"><p class="text-sm font-semibold text-slate-800 dark:text-white truncate">${emp.name}</p><p class="text-xs text-slate-400">${emp.phone||''}</p></div>${canEdit()?`<div class="flex gap-1.5"><button onclick="openEmpModal('${emp.id}')" class="w-8 h-8 rounded-lg bg-blue-50 dark:bg-blue-900/20 flex items-center justify-center text-blue-500 hover:bg-blue-100 transition"><i class="fas fa-edit text-xs"></i></button><button onclick="delEmp('${emp.id}')" class="w-8 h-8 rounded-lg bg-red-50 dark:bg-red-900/20 flex items-center justify-center text-red-400 hover:bg-red-100 transition"><i class="fas fa-trash text-xs"></i></button></div>`:''}</div>`;});});html+='</div>';}document.getElementById('page-employees').innerHTML=html;}
function openEmpModal(eid){const emp=eid?S.employees.find(e=>e.id===eid):null;const opts=CATS.map(c=>`<option value="${c.id}" ${emp&&emp.category===c.id?'selected':''}>${c.name}</option>`).join('');openModal(`<div class="p-6"><h3 class="text-lg font-bold text-slate-900 dark:text-white mb-4">${emp?'تعديل':'إضافة'} موظف</h3><div class="space-y-3"><div><label class="block text-sm text-slate-600 dark:text-slate-300 mb-1">الاسم</label><input id="em-name" type="text" value="${emp?emp.name:''}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-800 dark:text-white outline-none focus:border-emerald-500"></div><div><label class="block text-sm text-slate-600 dark:text-slate-300 mb-1">الفئة</label><select id="em-cat" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-800 dark:text-white outline-none focus:border-emerald-500">${opts}</select></div><div><label class="block text-sm text-slate-600 dark:text-slate-300 mb-1">رقم الهاتف</label><input id="em-phone" type="tel" value="${emp?emp.phone||'':''}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-800 dark:text-white outline-none focus:border-emerald-500"></div></div><div class="flex gap-2 mt-5"><button onclick="saveEmp('${eid||''}')" class="flex-1 bg-emerald-500 text-white py-2.5 rounded-xl font-medium text-sm hover:bg-emerald-600 transition">حفظ</button><button onclick="closeModal2()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 py-2.5 rounded-xl font-medium text-sm hover:bg-slate-200 transition">إلغاء</button></div></div>`);}
function saveEmp(eid){const name=document.getElementById('em-name').value.trim(),category=document.getElementById('em-cat').value,phone=document.getElementById('em-phone').value.trim();if(!name){toast('أدخل الاسم','warning');return;}const data={name,category,phone,active:true};if(eid){db.ref('employees/'+eid).update(data).then(()=>{const i=S.employees.findIndex(e=>e.id===eid);if(i>-1)S.employees[i]={...S.employees[i],...data};closeModal2();renderEmps();toast('تم التعديل');});}else{const id=gid();db.ref('employees/'+id).set(data).then(()=>{S.employees.push({id,...data});closeModal2();renderEmps();toast('تم الإضافة');});}}
function delEmp(id){openModal(`<div class="p-6 text-center"><div class="w-14 h-14 mx-auto mb-4 rounded-full bg-red-50 dark:bg-red-900/20 flex items-center justify-center"><i class="fas fa-user-minus text-red-500 text-xl"></i></div><h3 class="text-lg font-bold text-slate-900 dark:text-white mb-2">حذف الموظف؟</h3><div class="flex gap-2 mt-5"><button onclick="db.ref('employees/${id}').remove().then(()=>{S.employees=S.employees.filter(e=>e.id!==id);closeModal2();renderEmps();toast('تم الحذف','info')})" class="flex-1 bg-red-500 text-white py-2.5 rounded-xl font-medium text-sm hover:bg-red-600 transition">حذف</button><button onclick="closeModal2()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 py-2.5 rounded-xl font-medium text-sm hover:bg-slate-200 transition">إلغاء</button></div></div>`);}

function renderSett(){document.getElementById('page-settings').innerHTML=`<div class="max-w-2xl space-y-4"><div class="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-100 dark:border-slate-700"><h3 class="font-bold text-slate-900 dark:text-white mb-4"><i class="fas fa-palette text-emerald-500 ml-2"></i>المظهر</h3><div class="flex items-center justify-between"><div><p class="text-slate-800 dark:text-white font-medium text-sm">الوضع الداكن</p><p class="text-slate-400 text-xs">تبديل بين الوضعين</p></div><button onclick="toggleTheme()" class="relative w-14 h-7 rounded-full bg-slate-200 dark:bg-emerald-500 transition-colors"><span class="absolute top-0.5 right-0.5 w-6 h-6 rounded-full bg-white shadow-md transition-transform dark:-translate-x-7"></span></button></div></div><div class="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-100 dark:border-slate-700"><h3 class="font-bold text-slate-900 dark:text-white mb-4"><i class="fas fa-cloud text-emerald-500 ml-2"></i>الاتصال</h3><div class="flex items-center gap-3 p-3 bg-emerald-50 dark:bg-emerald-900/20 rounded-xl"><div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div><div><p class="text-sm font-medium text-emerald-700 dark:text-emerald-400">متصل بـ Firebase</p><p class="text-xs text-emerald-500">البيانات على السحابة</p></div></div></div><div class="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-100 dark:border-slate-700"><h3 class="font-bold text-slate-900 dark:text-white mb-4"><i class="fas fa-user-shield text-emerald-500 ml-2"></i>المستخدمين</h3><div id="users-list" class="space-y-2 mb-3"></div><button onclick="openUserModal()" class="px-4 py-2 bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 dark:text-emerald-400 rounded-xl text-sm font-medium hover:bg-emerald-100 transition"><i class="fas fa-user-plus ml-1"></i>إضافة مستخدم</button></div><div class="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-100 dark:border-slate-700"><h3 class="font-bold text-slate-900 dark:text-white mb-3"><i class="fas fa-info-circle text-emerald-500 ml-2"></i>حول التطبيق</h3><div class="text-sm text-slate-500 dark:text-slate-400 space-y-1"><p>محطة مركز المدينة</p><p>SHARKAWY - الإصدار 2.2.0</p><p>PWA + Firebase</p></div></div></div>`;document.getElementById('users-list').innerHTML=S.users.map(u=>`<div class="flex items-center gap-3 p-2.5 bg-slate-50 dark:bg-slate-900/50 rounded-xl"><div class="w-8 h-8 rounded-full bg-emerald-100 dark:bg-emerald-900/30 flex items-center justify-center"><i class="fas fa-user text-emerald-600 dark:text-emerald-400 text-xs"></i></div><div class="flex-1 min-w-0"><p class="text-sm font-medium text-slate-800 dark:text-white">${u.name}</p><p class="text-xs text-slate-400">@${u.username} - ${u.role}</p></div>${u.username!=='admin'?`<button onclick="db.ref('users/${u.username}').remove().then(()=>{S.users=S.users.filter(x=>x.username!==u.username);renderSett();toast('تم الحذف','info')})" class="text-red-400 hover:text-red-500"><i class="fas fa-trash text-xs"></i></button>`:''}</div>`).join('');}
function openUserModal(){openModal(`<div class="p-6"><h3 class="text-lg font-bold text-slate-900 dark:text-white mb-4">إضافة مستخدم</h3><div class="space-y-3"><div><label class="block text-sm text-slate-600 dark:text-slate-300 mb-1">الاسم</label><input id="nu-name" type="text" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-800 dark:text-white outline-none focus:border-emerald-500"></div><div><label class="block text-sm text-slate-600 dark:text-slate-300 mb-1">اسم المستخدم</label><input id="nu-user" type="text" dir="ltr" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-800 dark:text-white outline-none focus:border-emerald-500"></div><div><label class="block text-sm text-slate-600 dark:text-slate-300 mb-1">كلمة المرور</label><input id="nu-pass" type="text" dir="ltr" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-800 dark:text-white outline-none focus:border-emerald-500"></div><div><label class="block text-sm text-slate-600 dark:text-slate-300 mb-1">الدور</label><select id="nu-role" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-800 dark:text-white outline-none focus:border-emerald-500"><option>مدير المحطة</option><option>مهندس</option></select></div></div><div class="flex gap-2 mt-5"><button onclick="saveUser()" class="flex-1 bg-emerald-500 text-white py-2.5 rounded-xl font-medium text-sm hover:bg-emerald-600 transition">حفظ</button><button onclick="closeModal2()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 py-2.5 rounded-xl font-medium text-sm hover:bg-slate-200 transition">إلغاء</button></div></div>`);}
function saveUser(){const name=document.getElementById('nu-name').value.trim(),username=document.getElementById('nu-user').value.trim(),password=document.getElementById('nu-pass').value.trim(),role=document.getElementById('nu-role').value;if(!name||!username||!password){toast('أكمل البيانات','warning');return;}if(S.users.find(u=>u.username===username)){toast('اسم المستخدم موجود','error');return;}db.ref('users/'+username).set({name,password,role}).then(()=>{S.users.push({username,name,password,role});closeModal2();renderSett();toast('تم الإضافة');});}

function initApp(){document.documentElement.classList.add('dark');navigate('dashboard');}
loadAll().then(()=>{document.getElementById('loading-screen').style.display='none';document.getElementById('login-screen').style.display='flex';if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});}).catch(e=>{document.getElementById('loading-screen').innerHTML='<div class="text-center"><i class="fas fa-exclamation-triangle text-4xl text-red-400 mb-4"></i><p class="text-white text-lg">خطأ في التحميل</p><p class="text-slate-400 text-sm mt-2">'+e.message+'</p><button onclick="location.reload()" class="mt-4 px-6 py-2 bg-emerald-500 text-white rounded-xl">إعادة المحاولة</button></div>';});
</script>
</body>
</html>
