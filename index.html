<script>
/* ========== الثوابت ========== */

];
const CATS=[
    {id:'engineer',name:'مهندس',icon:'fa-hard-hat',color:'#10b981'},
    {id:'supervisor',name:'مشرف',icon:'fa-user-tie',color:'#3b82f6'},

    {name:'م. محمد علي سعيد',category:'engineer',phone:'01000000002',active:true},
    {name:'م. حسن إبراهيم عبدالله',category:'engineer',phone:'01000000003',active:true},

    {name:'عمرو حسن أحمد',category:'supervisor',phone:'01000000005',active:true},
    {name:'محمود حسن علي',category:'operator',phone:'01000000006',active:true},
    {name:'أحمد سعيد محمد',category:'operator',phone:'01000000007',active:true},
    {name:'محمد عبدالله حسن',category:'operator',phone:'01000000008',active:true},
    {name:'حسام محمود سعيد',category:'operator',phone:'01000000009',active:true},
    {name:'علي أحمد إبراهيم',category:'operator',phone:'01000000010',active:true},
    {name:'عمر حسين محمد',category:'operator',phone:'01000000011',active:true},
    {name:'ياسر محمد خالد',category:'operator',phone:'01000000012',active:true},
    {name:'طارق علي حسن',category:'operator',phone:'01000000013',active:true},
    {name:'سعيد محمود أحمد',category:'security',phone:'01000000014',active:true},
    {name:'حسن أحمد سعيد',category:'security',phone:'01000000015',active:true},
    {name:'محمد سعيد علي',category:'driver',phone:'01000000016',active:true},
    {name:'علي حسن محمد',category:'driver',phone:'01000000017',active:true}
];
const NAV_ITEMS=[
    {id:'dashboard',name:'لوحة التحكم',icon:'fa-chart-pie',allView:true},
    {id:'attendance',name:'تسجيل الحضور',icon:'fa-clipboard-check'},

];

/* ========== Firebase ========== */
const firebaseConfig={apiKey:"AIzaSyBpPKBDQ3ZTcMVZ4cTPfCMWzKEXsy-xByE",authDomain:"sharkawy-3a9d0.firebaseapp.com",databaseURL:"https://sharkawy-3a9d0-default-rtdb.europe-west1.firebasedatabase.app",projectId:"sharkawy-3a9d0",storageBucket:"sharkawy-3a9d0.firebasestorage.app",messagingSenderId:"788300090166",appId:"1:788300090166:web:3af8d1937feea01df90197",measurementId:"G-WYE9RCDPWS"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* ========== الحالة ========== */
let S={currentUser:null,currentStation:'all',stationsData:{},activeFilters:['engineer','supervisor','operator','security','driver'],currentPage:'dashboard'};
let _idC=0;

/* ========== أدوات مساعدة ========== */
function gid(){return'id_'+Date.now()+'_'+(_idC++)+'_'+Math.random().toString(36).substr(2,5)}
function getToday(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function getTime(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function fmtDate(s){if(!s)return'';const d=new Date(s+'T00:00:00');return['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'][d.getDay()]+' '+d.getDate()+' '+['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'][d.getMonth()]+' '+d.getFullYear()}
function catObj(id){return CATS.find(c=>c.id===id)||{id,name:id,icon:'fa-user',color:'#64748b'}}
function attName(id){return(ATT_ALL.find(a=>a.id===id)||{}).name||'لم يسجل'}
function attBadge(s){return{present:'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400',absent:'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400',sick:'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400',permission:'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-400',other_station:'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400'}[s]||'bg-slate-100 text-slate-500'}
function isWeekend(s){const d=new Date(s+'T00:00:00').getDay();return d===5||d===6}
function daysInMonth(y,m){return new Date(y,m,0).getDate()}
function stInfo(id){return STATIONS.find(s=>s.id===id)||STATIONS[0]}
function stData(){return S.stationsData[S.currentStation]||{employees:[],attendance:{},leaves:[]}}
function stEmps(){return stData().employees.filter(e=>e.active)}
function stAtt(){return stData().attendance}
function stLeaves(){return stData().leaves}
function isSuper(){return S.currentUser&&S.currentUser.role==='مدير 6 محطات'}

/* ========== واجهة المستخدم ========== */
function toast(msg,type='success'){const c=document.getElementById('toast-container');const cl={success:'bg-emerald-500',error:'bg-red-500',warning:'bg-amber-500',info:'bg-blue-500'};const ic={success:'fa-check-circle',error:'fa-exclamation-circle',warning:'fa-exclamation-triangle',info:'fa-info-circle'};const t=document.createElement('div');t.className=`${cl[type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 toast-in`;t.innerHTML=`<i class="fas ${ic[type]}"></i><span class="text-sm font-medium flex-1">${msg}</span><button onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>`;c.appendChild(t);setTimeout(()=>{t.classList.replace('toast-in','toast-out');setTimeout(()=>t.remove(),300);},3500)}
function openModal(h){document.getElementById('modal-body').innerHTML=h;document.getElementById('modal-overlay').classList.remove('hidden');document.body.style.overflow='hidden'}
function closeModal(e){if(e&&e.target!==document.getElementById('modal-overlay'))return;document.getElementById('modal-overlay').classList.add('hidden');document.body.style.overflow=''}
function closeModal2(){document.getElementById('modal-overlay').classList.add('hidden');document.body.style.overflow=''}
function animNum(id,target){const el=document.getElementById(id);if(!el)return;let cur=0;const step=Math.max(1,Math.ceil(target/20));const iv=setInterval(()=>{cur=Math.min(cur+step,target);el.textContent=cur;if(cur>=target)clearInterval(iv);},35)}
function toggleSidebar(show){const s=document.getElementById('sidebar'),o=document.getElementById('sidebar-overlay');const sh=show!==undefined?show:!s.classList.contains('sidebar-mobile-hidden');if(sh){s.classList.remove('sidebar-mobile-hidden');s.classList.add('sidebar-mobile-visible');o.classList.remove('hidden')}else{s.classList.add('sidebar-mobile-hidden');s.classList.remove('sidebar-mobile-visible');o.classList.add('hidden')}}
function toggleTheme(){document.documentElement.classList.toggle('dark');const i=document.getElementById('theme-icon');if(i)i.className=document.documentElement.classList.contains('dark')?'fas fa-sun text-yellow-400':'fas fa-moon text-slate-500'}

/* ========== تحميل البيانات ========== */
function loadUsers(){return db.ref('users').once('value').then(s=>{const d=s.val();return d?Object.entries(d).map(([k,v])=>({...v,username:k})):[]})}
function loadStation(id){return Promise.all([db.ref('stations/'+id+'/employees').once('value'),db.ref('stations/'+id+'/attendance').once('value'),db.ref('stations/'+id+'/leaves').once('value')]).then(([e,a,l])=>{const ed=e.val();const emps=ed?Object.entries(ed).map(([k,v])=>({...v,id:k})):[];const att=a.val()||{};const ld=l.val();const leaves=ld?Object.entries(ld).map(([k,v])=>({...v,id:k})):[];S.stationsData[id]={employees:emps,attendance:att,leaves}})}
async function initDefaultData(){const u={};u['users/admin_all']={name:'مدير 6 محطات',password:'1234',role:'مدير 6 محطات'};STATIONS.forEach(s=>{u['users/admin_'+s.id]={name:'مدير '+s.name,password:'1234',role:'مدير المحطة',station:s.id};DEF_EMPS.forEach(e=>{u['stations/'+s.id+'/employees/'+gid()]={name:e.name,category:e.category,phone:e.phone,active:true}})});await db.ref().update(u);await loadAllData()}

function addLeaveModal(){const ae=stEmps();let opts=ae.map(e=>`<option value="${e.id}">${e.name}</option>`).join('');openModal(`<div class="p-6"><h3 class="text-lg font-bold text-slate-900 dark:text-white mb-4">إضافة إذن / إجازة</h3><div class="space-y-3"><div><label class="block text-sm text-slate-600 dark:text-slate-300 mb-1">الموظف</label><select id="leave-emp" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-800 dark:text-white outline-none focus:border-emerald-500">${opts}</select></div><div><label class="block text-sm text-slate-600 dark:text-slate-300 mb-1">النوع</label><select id="leave-type" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-800 dark:text-white outline-none focus:border-emerald-500"><option value="sick">إجازة مرضية</option><option value="permission">إذن</option><option value="other_station">محطة أخرى</option></select></div><div><label class="block text-sm text-slate-600 dark:text-slate-300 mb-1">التاريخ</label><input id="leave-date" type="date" value="${getToday()}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-800 dark:text-white outline-none focus:border-emerald-500"></div><div><label class="block text-sm text-slate-600 dark:text-slate-300 mb-1">ملاحظات</label><input id="leave-note" type="text" placeholder="ملاحظات..." class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-800 dark:text-white outline-none focus:border-emerald-500"></div></div><div class="flex gap-3 mt-6"><button onclick="saveLeave()" class="flex-1 bg-emerald-500 text-white py-2.5 rounded-xl font-medium hover:bg-emerald-600 transition">حفظ</button><button onclick="closeModal2()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 py-2.5 rounded-xl font-medium hover:bg-slate-200 transition">إلغاء</button></div></div>`)}
function saveLeave(){const empId=document.getElementById('leave-emp').value,type=document.getElementById('leave-type').value,date=document.getElementById('leave-date').value,note=document.getElementById('leave-note').value;const id=gid();S.stationsData[S.currentStation].leaves.push({id,empId,type,date,note});db.ref('stations/'+S.currentStation+'/leaves/'+id).set({empId,type,date,note}).then(()=>{closeModal2();renderLeaves();toast('تم الحفظ')}).catch(e=>toast('خطأ','error'))}
function deleteLeave(id){if(!confirm('حذف هذا السجل؟'))return;S.stationsData[S.currentStation].leaves=S.stationsData[S.currentStation].leaves.filter(l=>l.id!==id);db.ref('stations/'+S.currentStation+'/leaves/'+id).remove().then(()=>{renderLeaves();toast('تم الحذف','warning')})}

/* ========== إدارة الموظفين ========== */
function renderEmps(){const emps=stData().employees;const grouped={};CATS.forEach(c=>grouped[c.id]=[]);emps.forEach(e=>{if(grouped[e.category])grouped[e.category].push(e);else grouped['other']=(grouped['other']||[]).concat(e)});let html=`<div class="flex justify-between items-center mb-4"><p class="text-sm text-slate-400">${emps.length} موظف</p><button onclick="addEmpModal()" class="px-4 py-2 rounded-xl bg-emerald-500 text-white text-sm font-medium hover:bg-emerald-600 transition"><i class="fas fa-plus ml-1"></i>إضافة موظف</button></div>`;CATS.forEach(c=>{const list=grouped[c.id];if(!list||!list.length)return;html+=`<div class="mb-4"><div class="flex items-center gap-2 mb-2 px-1"><div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:${c.color}20"><i class="fas ${c.icon} text-xs" style="color:${c.color}"></i></div><h4 class="font-bold text-slate-800 dark:text-slate-100 text-sm">${c.name}</h4><span class="text-xs text-slate-400">(${list.length})</span></div><div class="space-y-2">`;list.forEach(emp=>{html+=`<div class="emp-row bg-white dark:bg-slate-800 rounded-xl p-3 border border-slate-100 dark:border-slate-700 flex items-center gap-3"><div class="w-9 h-9 rounded-full flex items-center justify-center text-white text-xs font-bold" style="background:${c.color}">${emp.name.charAt(0)}</div><div class="flex-1 min-w-0"><p class="text-sm font-semibold text-slate-800 dark:text-white truncate">${emp.name}</p><p class="text-xs text-slate-400">${emp.phone||''}</p></div><span class="badge ${emp.active?'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400':'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400'}">${emp.active?'نشط':'موقوف'}</span><button onclick="editEmpModal('${emp.id}')" class="w-8 h-8 rounded-lg bg-blue-50 dark:bg-blue-900/20 text-blue-500 flex items-center justify-center hover:bg-blue-100 transition text-xs"><i class="fas fa-edit"></i></button><button onclick="deleteEmp('${emp.id}')" class="w-8 h-8 rounded-lg bg-red-50 dark:bg-red-900/20 text-red-500 flex items-center justify-center hover:bg-red-100 transition text-xs"><i class="fas fa-trash"></i></button></div>`});html+='</div></div>'});document.getElementById('page-employees').innerHTML=html||'<p class="text-slate-400 text-center py-8">لا يوجد موظفين</p>'}
function empFormHtml(emp){const cats=CATS.map(c=>`<option value="${c.id}" ${emp&&emp.category===c.id?'selected':''}>${c.name}</option>`).join('');return`<div class="p-6"><h3 class="text-lg font-bold text-slate-900 dark:text-white mb-4">${emp?'تعديل موظف':'إضافة موظف جديد'}</h3><div class="space-y-3"><div><label class="block text-sm text-slate-600 dark:text-slate-300 mb-1">الاسم</label><input id="emp-name" type="text" value="${emp?emp.name:''}" placeholder="اسم الموظف" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-800 dark:text-white outline-none focus:border-emerald-500"></div><div><label class="block text-sm text-slate-600 dark:text-slate-300 mb-1">الفئة</label><select id="emp-cat" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-800 dark:text-white outline-none focus:border-emerald-500">${cats}</select></div><div><label class="block text-sm text-slate-600 dark:text-slate-300 mb-1">رقم التليفون</label><input id="emp-phone" type="text" value="${emp?emp.phone||'':''}" placeholder="01xxxxxxxxx" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-800 dark:text-white outline-none focus:border-emerald-500"></div><div class="flex items-center gap-2"><input id="emp-active" type="checkbox" ${!emp||emp.active?'checked':''} class="w-4 h-4 accent-emerald-500"><label for="emp-active" class="text-sm text-slate-600 dark:text-slate-300">نشط</label></div></div><div class="flex gap-3 mt-6"><button onclick="saveEmp('${emp?emp.id:''}')" class="flex-1 bg-emerald-500 text-white py-2.5 rounded-xl font-medium hover:bg-emerald-600 transition">حفظ</button><button onclick="closeModal2()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 py-2.5 rounded-xl font-medium hover:bg-slate-200 transition">إلغاء</button></div></div>`}
function addEmpModal(){openModal(empFormHtml(null))}
function editEmpModal(id){const emp=stData().employees.find(e=>e.id===id);if(emp)openModal(empFormHtml(emp))}
function saveEmp(id){const name=document.getElementById('emp-name').value.trim(),category=document.getElementById('emp-cat').value,phone=document.getElementById('emp-phone').value.trim(),active=document.getElementById('emp-active').checked;if(!name){toast('أدخل الاسم','warning');return}if(id){const emp=stData().employees.find(e=>e.id===id);if(emp){emp.name=name;emp.category=category;emp.phone=phone;emp.active=active}db.ref('stations/'+S.currentStation+'/employees/'+id).set({name,category,phone,active})}else{const newId=gid();stData().employees.push({id:newId,name,category,phone,active});db.ref('stations/'+S.currentStation+'/employees/'+newId).set({name,category,phone,active})}.then(()=>{closeModal2();renderEmps();toast('تم الحفظ')}).catch(e=>toast('خطأ','error'))}
function deleteEmp(id){if(!confirm('هل تريد حذف هذا الموظف؟'))return;S.stationsData[S.currentStation].employees=S.stationsData[S.currentStation].employees.filter(e=>e.id!==id);db.ref('stations/'+S.currentStation+'/employees/'+id).remove().then(()=>{renderEmps();toast('تم الحذف','warning')})}

/* ========== الإعدادات ========== */
function renderSett(){const si=stInfo(S.currentStation);document.getElementById('page-settings').innerHTML=`<div class="max-w-2xl mx-auto space-y-4"><div class="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-100 dark:border-slate-700"><h3 class="font-bold text-slate-900 dark:text-white mb-4"><i class="fas fa-info-circle text-emerald-500 ml-2"></i>معلومات التطبيق</h3><div class="space-y-3 text-sm"><div class="flex justify-between p-3 bg-slate-50 dark:bg-slate-900/50 rounded-xl"><span class="text-slate-400">المحطة الحالية</span><span class="font-medium text-slate-800 dark:text-white">${S.currentStation==='all'?'جميع المحطات':si.name}</span></div><div class="flex justify-between p-3 bg-slate-50 dark:bg-slate-900/50 rounded-xl"><span class="text-slate-400">المستخدم</span><span class="font-medium text-slate-800 dark:text-white">${S.currentUser?S.currentUser.name:''}</span></div><div class="flex justify-between p-3 bg-slate-50 dark:bg-slate-900/50 rounded-xl"><span class="text-slate-400">الصلاحية</span><span class="font-medium text-emerald-600">${S.currentUser?S.currentUser.role:''}</span></div><div class="flex justify-between p-3 bg-slate-50 dark:bg-slate-900/50 rounded-xl"><span class="text-slate-400">عدد الموظفين</span><span class="font-medium text-slate-800 dark:text-white">${S.currentStation==='all'?'--':stEmps().length}</span></div></div></div><div class="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-100 dark:border-slate-700"><h3 class="font-bold text-slate-900 dark:text-white mb-4"><i class="fas fa-palette text-emerald-500 ml-2"></i>المظهر</h3><button onclick="toggleTheme()" class="px-6 py-3 rounded-xl bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 font-medium hover:bg-slate-200 transition"><i class="fas fa-adjust ml-2"></i>تبديل الوضع الفاتح / الداكن</button></div><div class="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-100 dark:border-slate-700"><h3 class="font-bold text-slate-900 dark:text-white mb-4"><i class="fas fa-key text-emerald-500 ml-2"></i>بيانات الدخول</h3><div class="text-sm text-slate-500 space-y-1"><p><span class="font-medium text-slate-700 dark:text-slate-300">مدير 6 محطات:</span> admin_all / 1234</p>${STATIONS.map(s=>`<p><span class="font-medium text-slate-700 dark:text-slate-300">مدير ${s.name}:</span> admin_${s.id} / 1234</p>`).join('')}</div></div><div class="text-center text-xs text-slate-400 py-4">SHARKAWY Station Management System v2.0</div></div>`}

/* ========== التهيئة ========== */
async function boot(){const bar=document.getElementById('load-bar');bar.style.width='20%';await loadUsers();bar.style.width='50%';const saved=localStorage.getItem('sharkawy_user');if(saved){try{S.currentUser=JSON.parse(saved);if(S._users.find(u=>u.username===S.currentUser.username&&u.password===S.currentUser.password)){document.getElementById('login-screen').style.display='none';document.getElementById('app').classList.remove('hidden');document.getElementById('current-user-name').textContent=S.currentUser.name;document.getElementById('current-user-role').textContent=S.currentUser.role;if(isSuper()){S.currentStation='all';document.getElementById('station-selector').classList.remove('hidden');document.getElementById('back-overview-btn').classList.remove('hidden')}else{S.currentStation=S.currentUser.station;document.getElementById('station-selector').classList.add('hidden');document.getElementById('back-overview-btn').classList.add('hidden')}bar.style.width='70%';await loadAllData();bar.style.width='100%';buildStationChips();buildSidebar();setTimeout(()=>{document.getElementById('loading-screen').style.opacity='0';document.getElementById('loading-screen').style.transition='opacity .4s';setTimeout(()=>document.getElementById('loading-screen').style.display='none',400);initApp()},300);return}}catch(e){localStorage.removeItem('sharkawy_user')}}bar.style.width='100%';setTimeout(()=>{document.getElementById('loading-screen').style.opacity='0';document.getElementById('loading-screen').style.transition='opacity .4s';setTimeout(()=>{document.getElementById('loading-screen').style.display='none';document.getElementById('login-screen').style.display='flex'},400)},500)}
// التحقق من وجود بيانات أولية
db.ref('users/admin_all').once('value').then(s=>{if(!s.exists()){boot().then(()=>initDefaultData().then(()=>{toast('تم تهيئة البيانات الافتراضية','info');navigate('dashboard')}))}else{boot()}}).catch(e=>{console.error(e);boot()});
</script>
</body>
</html>
